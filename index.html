<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Pixel de Sentimentos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin: 20px 0; background: #eee; padding: 5px; border-radius: 5px; min-height: 200px; }
        .pixel { width: 100%; padding-bottom: 100%; background: #fff; border-radius: 2px; transition: background 0.5s; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { border: none; padding: 15px 5px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; font-size: 0.8em; }
        .btn-v { background: #2ecc71; } .btn-a { background: #f1c40f; color: #333; } .btn-r { background: #e74c3c; }
        button:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
        #status { margin-top: 15px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pixel de Sentimentos</h2>
    <p>Saúde Mental no Trabalho</p>
    
    <div class="grid" id="pixelGrid"></div>

    <div id="votoArea">
        <div class="controls">
            <button id="btnV" class="btn-v" onclick="enviarVoto('#2ecc71')">TÔ BEM</button>
            <button id="btnA" class="btn-a" onclick="enviarVoto('#f1c40f')">ESTRESSADO</button>
            <button id="btnR" class="btn-r" onclick="enviarVoto('#e74c3c')">NO LIMITE</button>
        </div>
    </div>
    <p id="status">Carregando painel...</p>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyBIQ7h4zaO07wRy-bkwn3o90O7s2JnQ6mt0SHcVPIqrD8Llg1rE-zWLyRUMWmokMsP/exec'; 
    const grid = document.getElementById('pixelGrid');
    const status = document.getElementById('status');

    // Inicializa a grade
    for (let i = 0; i < 100; i++) {
        const div = document.createElement('div');
        div.className = 'pixel';
        grid.appendChild(div);
    }

    async function carregarDados() {
        try {
            // Timestamp evita cache para que o painel atualize de verdade
            const response = await fetch(scriptURL + '?t=' + new Date().getTime());
            const cores = await response.json();
            const pixels = document.querySelectorAll('.pixel');
            
            pixels.forEach(p => p.style.background = '#fff'); // Reseta visualmente antes de colorir
            cores.forEach((cor, index) => {
                if(pixels[index]) pixels[index].style.background = cor;
            });

            if (localStorage.getItem('votou')) {
                status.innerText = "Obrigado por participar!";
                travarBotoes();
            } else {
                status.innerText = "Como você se sente hoje?";
            }
        } catch (e) {
            console.error("Erro ao carregar:", e);
            status.innerText = "Painel pronto!";
        }
    }

    function enviarVoto(cor) {
        status.innerText = "Enviando seu pixel...";
        travarBotoes();

        // Enviando como parâmetros de URL (forma mais robusta para o Google Apps Script)
        const urlComParametros = scriptURL + "?cor=" + encodeURIComponent(cor);

        fetch(urlComParametros, {
            method: 'POST',
            mode: 'no-cors' 
        })
        .then(() => {
            localStorage.setItem('votou', 'true');
            status.innerText = "Sucesso! Atualizando...";
            setTimeout(() => {
                location.reload();
            }, 1200);
        })
        .catch(e => {
            console.error("Erro no envio:", e);
            alert("Erro ao enviar. Tente novamente.");
            liberarBotoes();
        });
    }

    function travarBotoes() {
        document.querySelectorAll('button').forEach(b => b.disabled = true);
    }

    function liberarBotoes() {
        document.querySelectorAll('button').forEach(b => b.disabled = false);
    }

    // Chama a função ao abrir a página
    carregarDados();
</script>
</body>
</html>
